name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"
  # E2E fan-out. The union of project×shard lanes runs the same functional
  # spec×project set as the unsharded run (456 invocations on 2026-07-09);
  # a11y (desktop-only) runs once on desktop shard 1.
  TOTAL_SHARDS: "2"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-fe:
    name: FE unit (vitest) + tech-debt + spec guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Unit tests (vitest)
        working-directory: CeraUI
        run: bun run --filter frontend test

      - name: Tech-debt register gate (validator unit tests + live register check)
        working-directory: CeraUI
        run: |
          bun run test:tech-debt
          bun run check:tech-debt

      - name: Guardrail — no page.screenshot/toHaveScreenshot in functional specs
        working-directory: CeraUI
        run: |
          ! grep -rE "page\.screenshot\(|toHaveScreenshot\(" apps/frontend/tests/e2e --include="*.spec.ts" | grep -v "\.visual\.spec\.ts"

      - name: Guardrail — no waitForTimeout in specs
        working-directory: CeraUI
        run: |
          ! grep -rE "waitForTimeout|page\.waitFor\(\s*[0-9]" apps/frontend/tests/e2e --include="*.spec.ts" | grep -v "\.visual\.spec\.ts"

      - name: Guardrail — no hardcoded #nav-tab- selectors in specs
        working-directory: CeraUI
        run: |
          ! grep -rnE "#nav-tab-" apps/frontend/tests/e2e --include="*.spec.ts"

      - name: Build Check workflow shape gate
        working-directory: CeraUI
        run: bun run test:build-check-shape

  test-be:
    name: BE unit (bun) + exec-guard + biome
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Release/package contract gate
        working-directory: CeraUI
        run: bun run test:release-package-contracts

      - name: Biome check (lint + format gate — S4 reliability rules)
        working-directory: CeraUI
        run: bunx biome check .

      - name: RC-pin merge gate (no -rc. pin of @ceralive/{control-protocol,cerastream})
        working-directory: CeraUI
        run: bun run check:rc-pins

      - name: Exec-guard gate (S1/S2 — bare-exec + spawn-policy contract + registration)
        working-directory: CeraUI
        run: bun run --filter backend check:exec-guard

      - name: Prepare backend test runtime directories
        run: sudo install -d -o "$(id -u)" -g "$(id -g)" /run/ceralive /var/run/bcrpt

      - name: Unit tests (bun)
        working-directory: CeraUI
        run: bun run --filter backend test

  setup-e2e:
    name: E2E setup (package deps, browser cache, frontend build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Resolve Playwright browser version
        id: playwright-version
        working-directory: CeraUI
        run: |
          version="$(bunx --bun playwright --version | sed -n 's/^Version //p')"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: CeraUI
        run: bun run --filter frontend test:e2e:install-browser

      - name: Build frontend once
        working-directory: CeraUI
        run: bun run build:frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: CeraUI/dist/public/
          if-no-files-found: error
          retention-days: 1

  test-e2e:
    name: E2E (${{ matrix.project }} shard ${{ matrix.shard }}/2)
    needs: setup-e2e
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [desktop, mobile]
        shard: [1, 2]
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Install Playwright system dependencies
        working-directory: CeraUI
        run: bun run --filter frontend test:e2e:install-deps

      - name: Resolve Playwright browser version
        id: playwright-version
        working-directory: CeraUI
        run: |
          version="$(bunx --bun playwright --version | sed -n 's/^Version //p')"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: CeraUI
        run: bun run --filter frontend test:e2e:install-browser

      - name: Download frontend dist
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: CeraUI/dist/public

      - name: Reset auth state
        working-directory: CeraUI
        run: rm -f apps/backend/auth_tokens.json

      - name: Start E2E servers
        working-directory: CeraUI
        run: |
          set -euo pipefail
          mkdir -p apps/frontend/test-results

          VITE_DEVICE_HOST=127.0.0.1 VITE_DEVICE_PORT=3002 bun run --filter frontend preview -- --host 127.0.0.1 --port 6173 \
            > "apps/frontend/test-results/vite-preview-${{ matrix.project }}-${{ matrix.shard }}.log" 2>&1 &
          echo "$!" > apps/frontend/test-results/vite-preview.pid

          MOCK_SCENARIO=multi-modem-wifi NODE_ENV=development bun run --filter backend dev:e2e \
            > "apps/frontend/test-results/backend-${{ matrix.project }}-${{ matrix.shard }}.log" 2>&1 &
          echo "$!" > apps/frontend/test-results/backend.pid

          for url in http://127.0.0.1:6173 http://127.0.0.1:3002/api/health; do
            for attempt in {1..120}; do
              if curl -fsS "$url" >/dev/null; then
                echo "ready: $url"
                break
              fi
              if [[ "$attempt" -eq 120 ]]; then
                echo "::error::server did not become ready: $url"
                exit 1
              fi
              sleep 1
            done
          done

      # a11y is desktop-only and small (3 tests); run it once on shard 1 rather
      # than re-running it inside every shard.
      - name: Accessibility gate (axe-core — critical/serious, baselined)
        if: ${{ matrix.project == 'desktop' && matrix.shard == 1 }}
        working-directory: CeraUI
        run: CI=true E2E_PASSWORD=12345678 bun run --filter frontend test:e2e -- a11y.spec.ts --project=desktop --reporter=line,json,blob
        env:
          MOCK_SCENARIO: multi-modem-wifi
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/a11y-desktop-${{ matrix.shard }}.json
          PLAYWRIGHT_BLOB_OUTPUT_DIR: test-results/blob-report-a11y-desktop-${{ matrix.shard }}

      - name: Upload a11y blob report
        if: ${{ always() && matrix.project == 'desktop' && matrix.shard == 1 }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-a11y-desktop-${{ matrix.shard }}
          path: CeraUI/apps/frontend/test-results/blob-report-a11y-desktop-${{ matrix.shard }}
          if-no-files-found: ignore
          retention-days: 1

      # Functional run, sharded across the project×shard matrix. The project
      # filter narrows the suite first; sharding then splits within that project.
      - name: Functional E2E (screenshot-free, no @visual, a11y gated separately)
        working-directory: CeraUI
        run: CI=true E2E_PASSWORD=12345678 bun run --filter frontend test:e2e -- --grep-invert "@visual|@a11y|@gallery" --project=${{ matrix.project }} --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }} --reporter=line,json,blob
        env:
          MOCK_SCENARIO: multi-modem-wifi
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/e2e-${{ matrix.project }}-${{ matrix.shard }}.json
          PLAYWRIGHT_BLOB_OUTPUT_DIR: test-results/blob-report-e2e-${{ matrix.project }}-${{ matrix.shard }}

      - name: Stop E2E servers
        if: always()
        working-directory: CeraUI
        run: |
          for pidfile in apps/frontend/test-results/backend.pid apps/frontend/test-results/vite-preview.pid; do
            if [[ -f "$pidfile" ]]; then
              kill "$(cat "$pidfile")" 2>/dev/null || true
            fi
          done

      - name: Upload E2E timing artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-timing-${{ matrix.project }}-${{ matrix.shard }}
          path: |
            CeraUI/apps/frontend/test-results/*.json
            CeraUI/apps/frontend/test-results/*.log
            CeraUI/apps/frontend/test-results/blob-report-*/
          if-no-files-found: ignore

      - name: Upload E2E blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.project }}-${{ matrix.shard }}
          path: CeraUI/apps/frontend/test-results/blob-report-e2e-${{ matrix.project }}-${{ matrix.shard }}
          if-no-files-found: ignore
          retention-days: 1

  merge-e2e-reports:
    name: Merge E2E blob reports
    if: ${{ !cancelled() }}
    needs: test-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v7
        with:
          path: CeraUI/apps/frontend/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge HTML report
        working-directory: CeraUI/apps/frontend
        run: bunx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-html-report
          path: CeraUI/apps/frontend/playwright-report/
          if-no-files-found: ignore

  test:
    name: Test (unit + E2E guardrails)
    needs: [test-fe, test-be, test-e2e, merge-e2e-reports]
    runs-on: ubuntu-latest
    steps:
      - name: All test jobs passed
        run: echo "FE unit, BE unit, and all E2E shards passed."

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Build backend for ${{ matrix.arch }}
        working-directory: CeraUI
        run: bun run build:backend
        env:
          BUILD_ARCH: ${{ matrix.arch }}

      - name: Build frontend
        working-directory: CeraUI
        run: bun run build:frontend

      - name: Guard — poisoned .env cannot leak into the production bundle
        working-directory: CeraUI
        run: |
          # A root .env is loaded by Vite in EVERY mode. Prove that even a
          # deliberately poisoned dev-only socket override cannot survive a
          # production build into dist/public (vite.config.ts outDir).
          echo "VITE_SOCKET_ENDPOINT=ws://localhost" > .env
          bun run build:frontend
          if grep -rq "ws://localhost" dist/public/; then
            echo "::error::poisoned .env leaked ws://localhost into the production bundle"
            grep -rl "ws://localhost" dist/public/ || true
            rm -f .env
            exit 1
          fi
          rm -f .env
          echo "OK: no ws://localhost in dist/public after a poisoned-.env prod build"

      - name: Verify build output
        working-directory: CeraUI
        run: |
          ls -la dist/
          test -f dist/ceralive || (echo "Backend binary not found" && exit 1)
          test -d dist/public || (echo "Frontend build not found" && exit 1)

      - name: Build Summary
        run: |
          {
            echo "## ✅ Build Check Passed"
            echo ""
            echo "**Architecture:** ${{ matrix.arch }}"
            echo ""
            echo "### Build Artifacts:"
            for f in CeraUI/dist/*; do echo "- \`$(basename "$f")\`"; done
          } >> "$GITHUB_STEP_SUMMARY"
