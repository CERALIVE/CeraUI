name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"
  # E2E shard fan-out. The union of all shards runs the SAME spec×project set as
  # the unsharded functional run (344 invocations); a11y (3, desktop-only) runs
  # once on shard 1. 344 = 172+172 splits evenly across 2 shards.
  TOTAL_SHARDS: "2"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-fe:
    name: FE unit (vitest) + tech-debt + spec guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Unit tests (vitest)
        working-directory: CeraUI
        run: bun run --filter frontend test

      - name: Tech-debt register gate (validator unit tests + live register check)
        working-directory: CeraUI
        run: |
          bun run test:tech-debt
          bun run check:tech-debt

      - name: Guardrail — no page.screenshot/toHaveScreenshot in functional specs
        working-directory: CeraUI
        run: |
          ! grep -rE "page\.screenshot\(|toHaveScreenshot\(" apps/frontend/tests/e2e --include="*.spec.ts" | grep -v "\.visual\.spec\.ts"

      - name: Guardrail — no waitForTimeout in specs
        working-directory: CeraUI
        run: |
          ! grep -rE "waitForTimeout|page\.waitFor\(\s*[0-9]" apps/frontend/tests/e2e --include="*.spec.ts" | grep -v "\.visual\.spec\.ts"

      - name: Guardrail — no hardcoded #nav-tab- selectors in specs
        working-directory: CeraUI
        run: |
          ! grep -rnE "#nav-tab-" apps/frontend/tests/e2e --include="*.spec.ts"

  test-be:
    name: BE unit (bun) + exec-guard + biome
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format gate — S4 reliability rules)
        working-directory: CeraUI
        run: bunx biome check .

      - name: RC-pin merge gate (no -rc. pin of @ceralive/{control-protocol,cerastream})
        working-directory: CeraUI
        run: bun run check:rc-pins

      - name: Exec-guard gate (S1/S2 — bare-exec + spawn-policy contract + registration)
        working-directory: CeraUI
        run: bun run --filter backend check:exec-guard

      - name: Unit tests (bun)
        working-directory: CeraUI
        run: bun run --filter backend test

  test-e2e:
    name: E2E (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Install Playwright system dependencies
        working-directory: CeraUI
        run: bun run --filter frontend test:e2e:install-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: CeraUI
        run: bun run --filter frontend test:e2e:install-browser

      - name: Reset auth state
        working-directory: CeraUI
        run: rm -f apps/backend/auth_tokens.json

      # a11y is desktop-only and small (3 tests); run it once on shard 1 rather
      # than re-running it inside every shard. Keeps the union identical to the
      # T19 baseline (3 a11y + 344 functional = 347 invocations).
      - name: Accessibility gate (axe-core — critical/serious, baselined)
        if: ${{ matrix.shard == 1 }}
        working-directory: CeraUI
        run: CI=true E2E_PASSWORD=12345678 bun run --filter frontend test:e2e -- a11y.spec.ts --project=desktop --reporter=line,json,blob
        env:
          MOCK_SCENARIO: multi-modem-wifi
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/a11y-shard-${{ matrix.shard }}.json
          PLAYWRIGHT_BLOB_OUTPUT_DIR: test-results/blob-report-a11y-${{ matrix.shard }}

      # Functional run, sharded across the matrix. Playwright partitions the spec
      # set deterministically; the union of --shard=1/2 + 2/2 is the full 344
      # spec×project functional set (both desktop AND mobile projects — no trim).
      - name: Functional E2E (screenshot-free, no @visual, a11y gated separately)
        working-directory: CeraUI
        run: CI=true E2E_PASSWORD=12345678 bun run --filter frontend test:e2e -- --grep-invert "@visual|@a11y|@gallery" --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }} --reporter=line,json,blob
        env:
          MOCK_SCENARIO: multi-modem-wifi
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/e2e-shard-${{ matrix.shard }}.json
          PLAYWRIGHT_BLOB_OUTPUT_DIR: test-results/blob-report-e2e-${{ matrix.shard }}

      - name: Upload E2E timing artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-timing-shard-${{ matrix.shard }}
          path: |
            CeraUI/apps/frontend/test-results/*.json
            CeraUI/apps/frontend/test-results/blob-report-*/
          if-no-files-found: ignore

  test:
    name: Test (unit + E2E guardrails)
    needs: [test-fe, test-be, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: All test jobs passed
        run: echo "FE unit, BE unit, and all E2E shards passed."

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Build backend for ${{ matrix.arch }}
        working-directory: CeraUI
        run: bun run build:backend
        env:
          BUILD_ARCH: ${{ matrix.arch }}

      - name: Build frontend
        working-directory: CeraUI
        run: bun run build:frontend

      - name: Guard — poisoned .env cannot leak into the production bundle
        working-directory: CeraUI
        run: |
          # A root .env is loaded by Vite in EVERY mode. Prove that even a
          # deliberately poisoned dev-only socket override cannot survive a
          # production build into dist/public (vite.config.ts outDir).
          echo "VITE_SOCKET_ENDPOINT=ws://localhost" > .env
          bun run build:frontend
          if grep -rq "ws://localhost" dist/public/; then
            echo "::error::poisoned .env leaked ws://localhost into the production bundle"
            grep -rl "ws://localhost" dist/public/ || true
            rm -f .env
            exit 1
          fi
          rm -f .env
          echo "OK: no ws://localhost in dist/public after a poisoned-.env prod build"

      - name: Verify build output
        working-directory: CeraUI
        run: |
          ls -la dist/
          test -f dist/ceralive || (echo "Backend binary not found" && exit 1)
          test -d dist/public || (echo "Frontend build not found" && exit 1)

      - name: Build Summary
        run: |
          {
            echo "## ✅ Build Check Passed"
            echo ""
            echo "**Architecture:** ${{ matrix.arch }}"
            echo ""
            echo "### Build Artifacts:"
            for f in CeraUI/dist/*; do echo "- \`$(basename "$f")\`"; done
          } >> "$GITHUB_STEP_SUMMARY"
