name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (unit + E2E guardrails)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: CeraUI/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: CeraUI/pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: CeraUI
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: CeraUI
        run: pnpm --filter frontend exec playwright install chromium --with-deps

      - name: Unit tests (vitest + bun)
        working-directory: CeraUI
        run: |
          pnpm --filter frontend run test
          pnpm --filter backend run test

      - name: Tech-debt register gate (validator unit tests + live register check)
        working-directory: CeraUI
        run: |
          pnpm run test:tech-debt
          pnpm run check:tech-debt

      - name: Guardrail — no page.screenshot/toHaveScreenshot in functional specs
        working-directory: CeraUI
        run: |
          ! grep -rE "page\.screenshot\(|toHaveScreenshot\(" apps/frontend/tests/e2e --include="*.spec.ts" | grep -v "\.visual\.spec\.ts"

      - name: Guardrail — no waitForTimeout in specs
        working-directory: CeraUI
        run: |
          ! grep -rE "waitForTimeout|page\.waitFor\(\s*[0-9]" apps/frontend/tests/e2e --include="*.spec.ts"

      - name: Guardrail — no hardcoded #nav-tab- selectors in specs
        working-directory: CeraUI
        run: |
          ! grep -rnE "#nav-tab-" apps/frontend/tests/e2e --include="*.spec.ts"

      - name: Reset auth state
        working-directory: CeraUI
        run: rm -f apps/backend/auth_tokens.json

      - name: Accessibility gate (axe-core — critical/serious, baselined)
        working-directory: CeraUI
        run: CI=true E2E_PASSWORD=12345678 pnpm --filter frontend exec playwright test a11y.spec.ts --project=desktop
        env:
          MOCK_SCENARIO: multi-modem-wifi

      - name: Functional E2E (screenshot-free, no @visual, a11y gated separately)
        working-directory: CeraUI
        run: CI=true E2E_PASSWORD=12345678 pnpm --filter frontend exec playwright test --grep-invert "@visual|@a11y"
        env:
          MOCK_SCENARIO: multi-modem-wifi

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: CeraUI/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: CeraUI/pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: CeraUI
        run: pnpm install --frozen-lockfile

      - name: Build backend for ${{ matrix.arch }}
        working-directory: CeraUI
        run: pnpm run build:backend
        env:
          BUILD_ARCH: ${{ matrix.arch }}

      - name: Build frontend
        working-directory: CeraUI
        run: pnpm run build:frontend

      - name: Guard — poisoned .env cannot leak into the production bundle
        working-directory: CeraUI
        run: |
          # A root .env is loaded by Vite in EVERY mode. Prove that even a
          # deliberately poisoned dev-only socket override cannot survive a
          # production build into dist/public (vite.config.ts outDir).
          echo "VITE_SOCKET_ENDPOINT=ws://localhost" > .env
          pnpm run build:frontend
          if grep -rq "ws://localhost" dist/public/; then
            echo "::error::poisoned .env leaked ws://localhost into the production bundle"
            grep -rl "ws://localhost" dist/public/ || true
            rm -f .env
            exit 1
          fi
          rm -f .env
          echo "OK: no ws://localhost in dist/public after a poisoned-.env prod build"

      - name: Verify build output
        working-directory: CeraUI
        run: |
          ls -la dist/
          test -f dist/ceralive || (echo "Backend binary not found" && exit 1)
          test -d dist/public || (echo "Frontend build not found" && exit 1)

      - name: Build Summary
        run: |
          {
            echo "## ✅ Build Check Passed"
            echo ""
            echo "**Architecture:** ${{ matrix.arch }}"
            echo ""
            echo "### Build Artifacts:"
            for f in CeraUI/dist/*; do echo "- \`$(basename "$f")\`"; done
          } >> "$GITHUB_STEP_SUMMARY"
