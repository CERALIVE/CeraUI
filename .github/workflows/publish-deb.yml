name: Publish ceralive-device .deb (manual recovery)

# Manual recovery publisher for an already-created release. Normal releases run
# only through publish-release.yml, which builds every asset and dispatches APT
# reindex after attaching the GitHub release. This workflow must never run from
# a tag push because tags created with GITHUB_TOKEN do not recursively trigger
# workflows, and a user-pushed tag would duplicate the release path.
#
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to repair (for example, v2026.7.0)"
        required: true
        type: string
      version:
        description: "Package version without v (for example, 2026.7.0)"
        required: true
        type: string

env:
  NODE_VERSION: "24"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The caller supplies both values because this recovery workflow is not tag
  # triggered. The build recipe reads $BUILD_VERSION first.
  resolve-version:
    name: Resolve version from tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      commit: ${{ steps.release.outputs.commit }}
    steps:
      - name: Verify default-branch dispatch
        env:
          DISPATCH_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          DEFAULT_REF="refs/heads/${DEFAULT_BRANCH}"
          test "$DISPATCH_REF" = "$DEFAULT_REF" || {
            echo "::error::recovery must be dispatched from ${DEFAULT_REF}, not ${DISPATCH_REF}"
            exit 1
          }

      - name: Validate stable tag and version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          TAG="$INPUT_TAG"
          STABLE_VERSION_PATTERN='^[0-9]{4}\.([1-9]|1[0-2])\.(0|[1-9][0-9]*)$'
          STABLE_TAG_PATTERN='^v[0-9]{4}\.([1-9]|1[0-2])\.(0|[1-9][0-9]*)$'

          if [[ ! "$VERSION" =~ $STABLE_VERSION_PATTERN ]]; then
            echo "::error::version must use stable CalVer YYYY.M.PATCH"
            exit 1
          fi
          if [[ ! "$TAG" =~ $STABLE_TAG_PATTERN ]]; then
            echo "::error::tag must use stable CalVer vYYYY.M.PATCH"
            exit 1
          fi
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "::error::tag must equal v<version>"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (from tag ${TAG})"

      - name: Verify matching GitHub release exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          RELEASE_TAG="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')" || {
            echo "::error::GitHub release ${TAG} does not exist"
            exit 1
          }
          test "$RELEASE_TAG" = "$TAG" || {
            echo "::error::GitHub release tag ${RELEASE_TAG} does not match ${TAG}"
            exit 1
          }
          RELEASE_COMMIT="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG}" --jq '.sha')"
          if [[ ! "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::could not resolve ${TAG} to an immutable commit"
            exit 1
          fi
          echo "commit=${RELEASE_COMMIT}" >> "$GITHUB_OUTPUT"

  release-package-contracts:
    name: Release/package contracts
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI
          ref: ${{ needs.resolve-version.outputs.commit }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      - name: Run release/package contracts
        working-directory: CeraUI
        run: bun run test:release-package-contracts

      - name: Lint and typecheck
        working-directory: CeraUI
        run: bun run lint

      - name: Prepare backend test runtime directories
        run: sudo install -d -o "$(id -u)" -g "$(id -g)" /run/ceralive /var/run/bcrpt

      - name: Run unit tests
        working-directory: CeraUI
        run: bun run test

  build-deb:
    name: Build ceralive-device .deb (${{ matrix.architecture }})
    runs-on: ubuntu-latest
    needs: [resolve-version, release-package-contracts]
    strategy:
      matrix:
        architecture: [arm64, amd64]
    steps:
      - name: Checkout CeraUI
        uses: actions/checkout@v7
        with:
          path: CeraUI
          ref: ${{ needs.resolve-version.outputs.commit }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch and verify supplied tag
        working-directory: CeraUI
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
          EXPECTED_COMMIT: ${{ needs.resolve-version.outputs.commit }}
        run: |
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git checkout --detach "$EXPECTED_COMMIT"
          TAG_COMMIT="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          test "$TAG_COMMIT" = "$EXPECTED_COMMIT" || {
            echo "::error::release tag ${TAG} moved from ${EXPECTED_COMMIT} to ${TAG_COMMIT}"
            exit 1
          }
          test "$HEAD_COMMIT" = "$EXPECTED_COMMIT" || {
            echo "::error::checked-out commit ${HEAD_COMMIT} does not match resolved release commit ${EXPECTED_COMMIT}"
            exit 1
          }
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$PACKAGE_VERSION" = "$VERSION" || {
            echo "::error::package.json version ${PACKAGE_VERSION} does not match recovery version ${VERSION}"
            exit 1
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('CeraUI/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Install Ruby and FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-dev gcc g++
          sudo gem install fpm

      # Resolves @ceralive/cerastream into node_modules so the build recipe can
      # derive cerastream-ipc-<major> from the installed bindings' constants.js
      # (the engine↔UI protocol-skew guard). Without this install the recipe
      # aborts — the major is NEVER hardcoded.
      - name: Install dependencies
        working-directory: CeraUI
        run: bun install --frozen-lockfile

      # arm64 and amd64 are both produced on this amd64 runner: the backend is a
      # bun --compile cross-target (build:backend-only maps BUILD_ARCH→bun target,
      # i.e. bun-linux-arm64 / bun-linux-x64) and fpm stamps Architecture from -a
      # without inspecting the ELF.
      - name: Build Debian package for ${{ matrix.architecture }}
        working-directory: CeraUI
        run: ./scripts/build/build-debian-package.sh
        env:
          BUILD_VERSION: ${{ needs.resolve-version.outputs.version }}
          BUILD_ARCH: ${{ matrix.architecture }}

      - name: Upload Debian package artifact (${{ matrix.architecture }})
        uses: actions/upload-artifact@v7
        with:
          name: ceralive-device-${{ matrix.architecture }}
          path: CeraUI/dist/debian/*.deb

  publish:
    name: Attach .debs to release + dispatch reindex
    runs-on: ubuntu-latest
    needs: [resolve-version, build-deb]
    # contents:write is required to attach the .deb assets to the GitHub release.
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage .debs for release
        run: |
          mkdir -p dist
          cp artifacts/ceralive-device-arm64/*.deb dist/
          cp artifacts/ceralive-device-amd64/*.deb dist/
          echo "Staged .debs:"
          ls -la dist

      - name: Verify matching GitHub release still exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          EXPECTED_COMMIT: ${{ needs.resolve-version.outputs.commit }}
        run: |
          RELEASE_TAG="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')" || {
            echo "::error::GitHub release ${TAG} no longer exists"
            exit 1
          }
          test "$RELEASE_TAG" = "$TAG" || {
            echo "::error::GitHub release tag ${RELEASE_TAG} does not match ${TAG}"
            exit 1
          }
          RELEASE_COMMIT="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG}" --jq '.sha')"
          test "$RELEASE_COMMIT" = "$EXPECTED_COMMIT" || {
            echo "::error::release tag ${TAG} moved from ${EXPECTED_COMMIT} to ${RELEASE_COMMIT}"
            exit 1
          }

      # Attach both arch .debs to the GitHub release for this tag. apt-worker
      # pulls the assets from here on the apt-reindex dispatch below — there is
      # no R2 upload and no per-repo APT metadata generation in this repo.
      - name: Attach .debs to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: CeraUI ${{ needs.resolve-version.outputs.tag }}
          files: dist/*.deb

      # Hand off to the central index owner: apt-worker fetches the release
      # assets, uploads to R2, then regenerates and signs Packages/Release for
      # the stable channel — once per channel, no per-repo reindex race.
      # CERALIVE_DISPATCH_TOKEN: fine-grained PAT, contents:write on CERALIVE/apt-worker only
      - name: Trigger centralized APT reindex
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CERALIVE_DISPATCH_TOKEN }}
          repository: CERALIVE/apt-worker
          event-type: apt-reindex
          client-payload: >-
            {"component":"ceralive-device","repo":"CeraUI","channel":"stable","tag":"${{ needs.resolve-version.outputs.tag }}","version":"${{ needs.resolve-version.outputs.version }}"}

      - name: Publish Summary
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
        run: |
          {
            echo "## Published ceralive-device"
            echo ""
            echo "**Version:** \`${VERSION}\`"
            echo "**Tag:** \`${TAG}\`"
            echo "**Channel:** \`stable\`"
            echo ""
            echo "Attached arm64 + amd64 .debs to the GitHub release."
            echo "Dispatched \`apt-reindex\` to CERALIVE/apt-worker for centralized R2 upload + metadata regen."
          } >> "$GITHUB_STEP_SUMMARY"
