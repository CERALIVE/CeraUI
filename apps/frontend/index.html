<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title id="page-title">CeraUI for CERALIVE©</title>
    <meta name="title" content="CeraUI for CERALIVE©" id="meta-title" />
    <meta name="description" content="A modern PWA for CERALIVE streaming encoder management and configuration" id="meta-description" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />

    <!-- Apple Touch Icons and PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CeraUI" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="site.webmanifest" />

    <!-- Theme Colors (cool slate palette) -->
    <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CeraUI" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <!-- PWA Preloader Styles -->
    <style>
      #pwa-preloader {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f5f7fa;
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      @media (prefers-color-scheme: dark) {
        #pwa-preloader {
          background: #0b0f1a;
          color: #ebeef3;
        }
      }

      .pwa-spinner {
        width: 32px;
        height: 32px;
        border: 4px solid #dee2ea;
        border-top: 4px solid #11C4D4;
        border-radius: 50%;
        animation: pwa-spin 1s linear infinite;
        margin-bottom: 16px;
      }

      @media (prefers-color-scheme: dark) {
        .pwa-spinner {
          border-color: #1a2030;
          border-top-color: #1FE7F9;
        }
      }

      @keyframes pwa-spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .pwa-text {
        font-family: 'Plus Jakarta Sans Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #6b7280;
        text-align: center;
      }

      @media (prefers-color-scheme: dark) {
        .pwa-text {
          color: #94a0b4;
        }
      }

      #offline-fallback {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f5f7fa;
        z-index: 10000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: 'Plus Jakarta Sans Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        #offline-fallback {
          background: #0b0f1a;
        }
      }

      .offline-content {
        text-align: center;
        padding: 20px;
      }

      .offline-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #dee2ea;
        border-top: 4px solid #11C4D4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @media (prefers-color-scheme: dark) {
        .offline-spinner {
          border-color: #1a2030;
          border-top-color: #1FE7F9;
        }
      }

      .offline-title {
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 10px;
        color: #111827;
      }

      @media (prefers-color-scheme: dark) {
        .offline-title {
          color: #ebeef3;
        }
      }

      .offline-text {
        color: #6b7280;
        margin: 0 0 20px;
      }

      @media (prefers-color-scheme: dark) {
        .offline-text {
          color: #94a0b4;
        }
      }

      .offline-button {
        background: #11C4D4;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }

      .offline-button:hover {
        background: #0EA8B8;
      }
    </style>
  </head>
  <body>
    <!-- PWA Preloader (shown immediately for PWA launches) -->
    <div id="pwa-preloader">
      <div class="pwa-spinner"></div>
      <div class="pwa-text">Loading CeraUI...</div>
    </div>

    <!-- Immediate fallback for PWA offline launches -->
    <div id="offline-fallback">
      <div class="offline-content">
        <div class="offline-spinner"></div>
        <h1 class="offline-title">You're Offline</h1>
        <p class="offline-text" id="offline-description">CeraUI needs an internet connection to manage your CERALIVE device.</p>
        <button onclick="window.location.reload()" class="offline-button">Try Again</button>
      </div>
    </div>

    <div id="app"></div>

    <!--
      Pre-boot failure screen. Renders PRE-CSS/pre-bundle, so it uses inline
      styles with literal Ground Control hex (graphite #080d09, phosphor-lime
      #abe841) — app.css tokens and the i18n runtime are unavailable here, hence
      the deliberate English-only copy and no external asset requests.
    -->
    <div
      id="js-failed"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #080d09;
        color: #eff3f0;
        z-index: 20000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 24px;
        text-align: center;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      "
    >
      <h1 style="color: #eff3f0; font-size: 22px; font-weight: 600; margin: 0 0 12px; letter-spacing: -0.01em">
        CeraUI didn't load
      </h1>
      <p style="color: #a0a6a1; font-size: 15px; line-height: 1.5; margin: 0 0 24px; max-width: 30rem">
        Check the device connection and reload.
      </p>
      <button
        onclick="window.location.reload()"
        style="
          background: #abe841;
          color: #080d09;
          border: none;
          padding: 12px 28px;
          border-radius: 8px;
          font-size: 15px;
          font-weight: 600;
          cursor: pointer;
          font-family: inherit;
        "
      >
        Reload
      </button>
    </div>

    <!-- Debug script to detect JS loading failure -->
    <script>
      // Show debug message only if the bundle failed to mount (not just slow connection)
      setTimeout(function () {
        if (!window.__ceraAppMounted) {
          document.getElementById('js-failed').style.display = 'flex';
        }
      }, 5000);
    </script>

    <!-- Immediate PWA Offline Detection Script -->
    <script>
      (function () {
        const isPWA =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone ||
          document.referrer.includes('android-app://');

        if (isPWA) {
          // Show preloader IMMEDIATELY for PWA launches
          const preloader = document.getElementById('pwa-preloader');
          if (preloader) {
            preloader.style.display = 'flex';
          }

          let hasShownOffline = false;
          let jsLoadFailed = false;
          let appCheckCount = 0;
          const maxAppChecks = 20; // 2 seconds (100ms * 20)

          // Listen for script load errors
          window.addEventListener(
            'error',
            e => {
              if (e.filename && e.filename.includes('/assets/index-')) {
                jsLoadFailed = true;
                showOfflineFallback();
              }
            },
            true,
          );

          // Check browser offline state immediately
          if (!navigator.onLine) {
            setTimeout(showOfflineFallback, 500); // Quick offline detection
          }

          const showOfflineFallback = () => {
            if (hasShownOffline) return; // Prevent multiple calls
            hasShownOffline = true;

            const fallback = document.getElementById('offline-fallback');
            if (fallback && preloader) {
              preloader.style.display = 'none';
              fallback.style.display = 'flex';
            }
          };

          const checkAppLoad = () => {
            appCheckCount++;

            // Already shown offline - stop checking
            if (hasShownOffline) return;

            // JavaScript bundle failed to load - show offline fallback
            if (jsLoadFailed) {
              showOfflineFallback();
              return;
            }

            // Bundle mounted - hide preloader and stop checking. Gate on the
            // explicit mount signal, NOT app.children.length: the app renders an
            // optimistic boot shell while it is still connecting to the device,
            // and "connecting" must never be mistaken for "offline".
            if (window.__ceraAppMounted) {
              if (preloader) preloader.style.display = 'none';
              const fallback = document.getElementById('offline-fallback');
              if (fallback) fallback.style.display = 'none';
              return;
            }

            // Bundle still hasn't mounted after 2s - genuine load failure.
            if (appCheckCount >= maxAppChecks) {
              showOfflineFallback();
              return;
            }

            // Continue checking
            setTimeout(checkAppLoad, 100);
          };

          // Start checking after a very short delay
          setTimeout(checkAppLoad, 50);

          // Fallback: if the bundle still hasn't mounted after 3s, force offline.
          // A mounted-but-connecting app keeps its own "Connecting…" shell.
          setTimeout(() => {
            if (!hasShownOffline && !window.__ceraAppMounted) {
              showOfflineFallback();
            }
          }, 3000);
        }
      })();
    </script>

    <!-- Theme Detection Script (prevents dark-mode FOUC) -->
    <script>
      (function() {
        try {
          // The theme store persists JSON (e.g. "dark"/"system"), so parse before comparing.
          var raw = localStorage.getItem('theme');
          var choice = null;
          if (raw) {
            try { choice = JSON.parse(raw); } catch (e) { choice = raw; }
          }
          if (typeof choice === 'string') choice = choice.replace(/^"+|"+$/g, '');

          var resolved;
          if (choice === 'light' || choice === 'dark') {
            resolved = choice;
          } else {
            // 'system' or no stored choice. On headless devices with no
            // prefers-color-scheme, system defaults to dark: a 'light' query miss
            // covers both OS-prefers-dark and no-preference, resolving both to dark
            // pre-paint (matches mode-watcher) so there is no light->dark flicker.
            resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }

          if (resolved === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>

    <!-- Brand Configuration Script -->
    <script>
      // Dynamic branding based on build configuration
      (function() {
        // Get brand configuration from Vite build-time variables
        const brandConfig = typeof __BRAND_CONFIG__ !== 'undefined' ? __BRAND_CONFIG__ : {
          siteName: "CeraUI for CERALIVE©",
          description: "A modern PWA for CERALIVE streaming encoder management and configuration",
          deviceName: "CERALIVE"
        };

        // Update page title
        const pageTitle = document.getElementById('page-title');
        if (pageTitle) pageTitle.textContent = brandConfig.siteName;

        // Update meta title
        const metaTitle = document.getElementById('meta-title');
        if (metaTitle) metaTitle.setAttribute('content', brandConfig.siteName);

        // Update meta description
        const metaDescription = document.getElementById('meta-description');
        if (metaDescription) metaDescription.setAttribute('content', brandConfig.description);

        // Update offline description
        const offlineDescription = document.getElementById('offline-description');
        if (offlineDescription) {
          offlineDescription.textContent = `CeraUI needs an internet connection to manage your ${brandConfig.deviceName} device.`;
        }
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
